<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ardio | Agency Landing Page</title>
    <link
      rel="shortcut icon"
      href="./Assets/Icon/Group 39865.png"
      type="image/x-icon"
    />
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Prosto+One&display=swap"
      rel="stylesheet"
    />
    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      .prosto {
        font-family: "Prosto One", sans-serif;
        font-style: normal;
      }
      .poppins {
        font-family: "Poppins", sans-serif;
        font-style: normal;
      }
    </style>
  </head>
  <body>
    <header>
      <nav class="bg-gray-100 shadow-sm fixed top-0 z-10 w-full px-2 md:px-0">
        <div class="flex justify-between py-2 container mx-auto">
          <div class="flex items-center gap-5">
            <h3 class="prosto text-2xl text-[#FF7171] font-bold">Ardio</h3>
            <img src="./Assets/Icon/Group 39865.png" class="w-5" />
          </div>
          <div class="flex items-center">
            <div
              class="gap-8 justify-between poppins font-medium flex hidden md:inline-flex"
            >
              <h4>About Studio</h4>
              <h4>Work</h4>
              <h4>Contact</h4>
            </div>
            <!-- Sidebar -->
            <div class="inline-block md:hidden">
              <input id="my-drawer-2" type="checkbox" class="drawer-toggle" />
              <div class="drawer-content flex flex-col">
                <!-- Navbar -->
                <div>
                  <div class="flex-none">
                    <label
                      for="my-drawer-2"
                      aria-label="open sidebar"
                      class="btn"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        class="inline-block h-6 w-6 stroke-current"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M4 6h16M4 12h16M4 18h16"
                        ></path>
                      </svg>
                    </label>
                  </div>
                </div>
              </div>
              <div class="drawer-side">
                <label
                  for="my-drawer-2"
                  aria-label="close sidebar"
                  class="drawer-overlay"
                ></label>
                <ul class="menu bg-gray-500 min-h-full w-50 p-4 gap-2">
                  <!-- Sidebar content here -->
                  <li><a class="btn rounded-full">About Studio</a></li>
                  <li><a class="btn rounded-full">Work</a></li>
                  <li><a class="btn rounded-full">Contact</a></li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </nav>

      <section class="mt-15 container mx-auto px-2 md:px-0">
        <div
          class="flex flex-col md:flex-row justify-between items-center gap-10"
        >
          <div class="left space-y-5">
            <button
              class="rounded-full bg-[#934CEC] text-white font-bold poppins btn"
            >
              New
            </button>
            <h3 class="text-6xl font-medium prosto">
              Driver Revenue Digital Marketing Agency That
            </h3>
            <div class="flex items-center poppins gap-10">
              <div>
                <h2 class="text-3xl font-medium">Our Office</h2>
                <p class="text-[#8B8A8F]">Agency - Berlin, Germany</p>
              </div>
              <p class="border-r-2 border-[#8B8A8F] h-15"></p>
              <div>
                <h1 class="text-3xl font-medium">Latest Project</h1>
                <p class="text-[#8B8A8F]">Design Product for Verde</p>
              </div>
            </div>
            <button
              class="btn rounded-full bg-none items-center border border-[#8B8A8F]"
            >
              Scroll down
              <i
                class="fa-sharp fa-solid fa-arrow-right-long fa-beat"
                style="color: rgb(0, 0, 0)"
              ></i>
            </button>
          </div>
          <div class="right relative">
            <img src="./Assets/Icon/hero.png" class="rounded-sm" />
            <img
              src="./Assets/Icon/Ellipse 736.png"
              class="w-20 absolute -bottom-5 -right-8 -z-10"
            />
            <img
              src="./Assets/Icon/hero-bg.png"
              class="absolute -bottom-10 -left-30 -z-10"
            />
          </div>
        </div>
        <div class="items-center text-center">
          <img
            src="./Assets/Icon/Group 1321314344.png"
            class="w-1/3 hidden md:inline-block"
          />
        </div>
      </section>
    </header>
  </body>
</html>
